// =========================================================================
//  EXAMPLE BINDS CFG FILE
//  GUIDE REF: Section 24 (CFG File Examples)
//
//  How to use:
//    1. Copy this file to: IW4x/players/profiles/
//    2. In IW4x console: exec example_binds.cfg
//    3. Or load automatically by adding "exec example_binds.cfg" to config.cfg
//
//  Each bind connects a key to a +command defined in _functions.gsc.
//  The cfg listener in _functions.gsc catches the +command and runs the function.
//  The cfg listener is threaded in _main.gsc onPlayerSpawned().
// =========================================================================

// --- Toggle binds (press to toggle on/off) ---
bind G "+godmode"       // God mode on/off
bind U "+ufo"           // UFO / noclip on/off
bind H "+speed"         // Speed boost on/off
bind J "+maxammo"       // Unlimited ammo on/off
bind F1 "+esp"          // ESP on/off

// --- Action binds (press to trigger once) ---
bind R "+refill"        // Refill ammo
bind F5 "+save"         // Save position
bind F6 "+load"         // Load position
bind K "+die"           // Suicide
bind F2 "+heal"         // Full heal
